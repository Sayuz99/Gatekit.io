name = "gatekit-api"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Secrets — set via: wrangler secret put STRIPE_SECRET_KEY etc.
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# JWT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "gatekit-db"
database_id   = "YOUR_D1_DATABASE_ID"   # replace after: wrangler d1 create gatekit-db

[dev]
port = 8787
